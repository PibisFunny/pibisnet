<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=320"/>
    <title>3DSMovies</title>
    <link rel="shortcut icon" href="https://www.pibis.net/img/icons/favicon.png">
    <style>
    body {
        margin: 0;
        padding: 0;
        background-image: url('img/textiles/starry.gif');
    }
    .card {
        display: block;
        text-decoration: none;
        color: purple;
        font-weight: bold;
        font-family: cursive;
        font-size: large;
    }
    .thumb {
      width: 100%;
      aspect-ratio: 1.67/1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: xx-large;
      background: #646464;
    }
    .thumb img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
    }
    .player-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      padding: 8px;
      color: white;
    }
    .player-overlay.active {
        display: block;
    }
    video {
        width: 100%;
        display: block;
    }
  </style>
</head>
<body>

<div style="text-align: center; margin-top: 16px;">
    <img style="width: 80%;" src="img/3dsmovies.png"/>
</div>

<table id="videoGrid" width="100%" cellspacing="8" cellpadding="0"></table>

<div class="player-overlay" id="playerOverlay">
  <button onclick="closePlayer()">Back to list</button>
  <p id="playerTitle"></p>
  <video id="videoEl" controls></video>
</div>

<div style="text-align: center; margin-top: 16px;">
    <img src="img/blunkies/pibis.gif"/>
</div>

<script>
  const videos = [
    { title: "Placeholder A", file: "media/3DSM/test.mp4", thumb: "media/3DSM/test.jpg", duration: "0:32" },
    { title: "Placeholder B", file: "media/3DSM/clip2.mp4", thumb: "", duration: "1:04" },
    { title: "Placeholder C",  file: "media/3DSM/short.mp4", thumb: "", duration: "3:12" },
    { title: "Placeholder D",   file: "media/3DSM/anim.mp4",  thumb: "", duration: "0:48" },
  ];

  const grid = document.getElementById('videoGrid');

  var row;
  videos.forEach(function(v, i) {
    if (i % 2 === 0) {
      row = document.createElement('tr');
      grid.appendChild(row);
    }
    var td = document.createElement('td');
    td.width = '50%';
    td.innerHTML = '<a class="card" href="#">' +
      '<div class="thumb">' +
      (v.thumb ? '<img src="' + v.thumb + '" alt="' + v.title + '">' : '<span>&#9654;</span>') +
      '</div>' +
      '<small>' + v.title + '</small><br><small>' + v.duration + '</small>' +
      '</a>';
    td.querySelector('a').addEventListener('click', function(e) {
      e.preventDefault();
      playVideo(v);
    });
    row.appendChild(td);
  });

  function playVideo(v) {
    document.getElementById('playerTitle').textContent = v.title;
    document.getElementById('videoEl').src = v.file;
    document.getElementById('playerOverlay').classList.add('active');
    document.getElementById('videoEl').play();
  }

  function closePlayer() {
    var videoEl = document.getElementById('videoEl');
    videoEl.pause();
    videoEl.src = '';
    document.getElementById('playerOverlay').classList.remove('active');
  }
</script>

</body>
</html>
